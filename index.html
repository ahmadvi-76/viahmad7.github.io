<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="description" content="أنا أحمد صاحب قناة viahmad7، أنشر فيديوهات ممتعة وتقنية. تابعني الآن!">
<meta name="keywords" content="viahmad7, احمد, قناة, تيك توك, انستجرام, فيديوهات">
<meta name="author" content="Ahmed">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>viahmad7 - أحمد</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    overflow:hidden;
    background: linear-gradient(135deg, #1a1a2e, #162447);
    color:#fff;
    height:100vh;
    position:relative;
    text-align:center;
}
h1 {
    font-size:50px;
    margin:20px;
    color:#ff4500;
}
h2 {
    font-size:28px;
    color:#00ffb3;
}
p {
    font-size:20px;
    width:80%;
    margin:10px auto;
}
#profileImage {
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid #ff4500;
    display:block;
    margin:20px auto;
}
.social a {
    color:#00ffff;
    margin:0 15px;
    font-size:20px;
    text-decoration:none;
}
button {
    margin:15px auto;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#ff4500;
    color:white;
    cursor:pointer;
    display:block;
}
.movingText {
    position:absolute;
    font-size:22px;
    font-weight:bold;
    text-shadow:1px 1px 3px #000;
}
.floatingImage {
    position:absolute;
    width:60px;
    height:60px;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>هلا والله أنا أحمد</h1>
<img id="profileImage" src="https://i.postimg.cc/4y2gbH59/IMG-E2829.jpg" alt="صورة القناة">
<h2>مرحبًا في قناة viahmad7</h2>
<p>أنا أحمد، أنزل فيديوهات ممتعة والعاب على حساباتي. اشتركو عشان تشوفوا كل جديد.</p>
<p>للتواصل: ahmadrahbari03@gmail.com</p>

<div class="social">
    <a href="https://www.tiktok.com/@vi76__" target="_blank">TikTok</a>
    <a href="https://www.instagram.com/vi.76a" target="_blank">Instagram</a>
</div>

<!-- الأزرار في وسط الصفحة -->
<button onclick="visitChannel()">شاهد القناة</button>
<button onclick="sayHello()">تواصل معي</button>

<!-- نصوص متحركة -->
<p id="moving1" class="movingText" style="top:400px; left:0px; color:#ff00ff;">اشتركو في القناة الآن يلا بسرعه!</p>
<p id="moving2" class="movingText" style="top:500px; left:200px; color:#00ffff;">فيديوهات جديدة كل شهرين ههههههه !</p>
<p id="moving3" class="movingText" style="top:600px; left:100px; color:#ff4500;">تابعوا الحسابات الاجتماعية!</p>

<!-- صور متحركة عشوائية -->
<img class="floatingImage" src="https://i.postimg.cc/hGtNMtXM/BSXO1095.png">
<img class="floatingImage" src="https://i.postimg.cc/Y268Gw9K/IMG-2587.jpg">

<!-- أصوات -->
<audio id="clickSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="hoverSound" src="https://www.soundjay.com/button/button-16.wav"></audio>

<script>
const clickSound = document.getElementById("clickSound");
const hoverSound = document.getElementById("hoverSound");

function visitChannel() {
    clickSound.play();
    window.open("https://www.youtube.com/@viahmad7");
}

function sayHello() {
    clickSound.play();
    alert("تقدر تتواصل معي عن طريق الإيميل أو حساباتي");
}

// نصوص تتحرك
const texts = [
    {id:"moving1", x:0, dx:2},
    {id:"moving2", x:200, dx:3},
    {id:"moving3", x:100, dx:2}
];

function animateTexts(){
    texts.forEach(obj=>{
        const t=document.getElementById(obj.id);
        obj.x+=obj.dx;
        if(obj.x>window.innerWidth-400||obj.x<0)obj.dx*=-1;
        t.style.left=obj.x+"px";
    });
    requestAnimationFrame(animateTexts);
}
animateTexts();

// صور تتحرك عشوائي وببطء
const imgs = document.querySelectorAll(".floatingImage");
const data = [];

imgs.forEach(img=>{
    let x = Math.random()*(window.innerWidth-60);
    let y = Math.random()*(window.innerHeight-60);
    let dx = (Math.random()*0.3+0.1)*(Math.random()<0.5?-1:1);
    let dy = (Math.random()*0.3+0.1)*(Math.random()<0.5?-1:1);
    img.style.left = x+"px";
    img.style.top = y+"px";
    data.push({img,x,y,dx,dy});
});

function move(){
    data.forEach(o=>{
        o.x += o.dx;
        o.y += o.dy;
        if(o.x<0 || o.x>window.innerWidth-60)o.dx*=-1;
        if(o.y<0 || o.y>window.innerHeight-60)o.dy*=-1;
        o.img.style.left=o.x+"px";
        o.img.style.top=o.y+"px";
    });
    requestAnimationFrame(move);
}
move();

// صوت عند Hover على الأزرار
document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("mouseenter",()=>{hoverSound.play();});
});
</script>

</body>
</html>
